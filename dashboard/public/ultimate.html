<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HAPB · Ultimate Swarm Control Deck</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/ultimate.css" />
</head>
<body class="cyber-body">
  <div id="app" class="app-container">
    
    <!-- Topbar Navigation & Control Center -->
    <header class="cyber-topbar" aria-live="polite">
      <div class="topbar-brand-group">
        <div class="cyber-logo" title="Hermes Autonomous Project Builder - Swarm Ops">
          <span class="logo-glitch" data-text="HAPB">HAPB</span>
          <span class="logo-sub">SWARM OPS</span>
        </div>
        
        <!-- Dashboard View Switcher -->
        <nav class="cyber-switcher" aria-label="Dashboard View Switcher">
          <a href="/" class="switcher-link" title="Classic Studio Multi-pane Layout">Studio</a>
          <a href="/matrix.html" class="switcher-link" title="Command Matrix Dense Grid View">Matrix</a>
          <a href="/timeline.html" class="switcher-link" title="Timeline Stream Workflow DAG">Timeline</a>
          <a href="/console.html" class="switcher-link" title="Developer Terminal/IDE View">Console</a>
          <a href="/ultimate.html" class="switcher-link active" title="Ultimate Swarm Control Deck">Swarm Ops</a>
        </nav>
      </div>

      <div id="topStatus" class="top-status-banner">
        <span class="status-pulse-dot"></span> Loading real-time telemetry…
      </div>

      <div class="topbar-actions">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input id="globalFilter" class="cyber-input" placeholder="Search events/tools/agents… (/)" aria-label="Global search filter" />
        </div>
        <span id="streamState" class="cyber-badge sse-connecting">Connecting SSE…</span>
        <button id="refreshNow" class="cyber-btn" title="Force payload fetch">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          Sync
        </button>
        <button id="pauseEvents" class="cyber-btn btn-pause" title="Pause or resume live stream">Pause</button>
      </div>
    </header>

    <!-- Pipeline Phase Workflow Strip -->
    <nav id="workflowStrip" class="workflow-bar" aria-label="Workflow execution phase pipeline"></nav>

    <!-- Main Swarm Ops Layout -->
    <main class="swarm-workspace">
      
      <!-- Swarm Topology Visual Banner Header -->
      <section class="topology-section cyber-panel">
        <div class="panel-header">
          <div class="header-title">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" class="neon-icon"><circle cx="12" cy="12" r="3"></circle><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path></svg>
            <h2>Swarm Topology Matrix</h2>
          </div>
          <div class="topology-stats">
            <span class="stat-tag"><strong id="statActiveAgents">0</strong> Active Nodes</span>
            <span class="stat-tag"><strong id="statRunningTools">0</strong> Active Tools</span>
            <span class="stat-tag"><strong id="statTotalEvents">0</strong> Telemetry Events</span>
          </div>
        </div>
        
        <div class="topology-canvas-container">
          <svg id="topologySvgLines" class="topology-svg"></svg>
          <div id="topologyNodes" class="topology-nodes-grid"></div>
        </div>
      </section>

      <!-- Subagent Deck & Filtering Grid -->
      <section class="deck-section">
        <div class="deck-toolbar">
          <div class="toolbar-left">
            <h2 class="section-heading">Active Subagent Fleet</h2>
            <div id="filterChips" class="filter-chips-group">
              <button data-filter="all" class="chip-btn active">All Nodes</button>
              <button data-filter="active" class="chip-btn">Active Execution</button>
              <button data-filter="tools" class="chip-btn">Tool Execution</button>
              <button data-filter="blocked" class="chip-btn">Blocked / Deblock</button>
              <button data-filter="completed" class="chip-btn">Completed</button>
            </div>
          </div>
          <div class="toolbar-right">
            <button id="collapseAllAgents" class="cyber-btn-sm">Collapse All</button>
            <button id="expandActiveAgents" class="cyber-btn-sm highlight">Expand Active</button>
          </div>
        </div>

        <!-- Dynamic Reconciled Subagent Cards Deck -->
        <div id="subagentDeck" class="subagent-cards-grid panel-scroll"></div>
      </section>
    </main>

    <!-- Slide-Over Unified Inspector Drawer -->
    <div id="drawerOverlay" class="drawer-overlay" hidden></div>
    <aside id="inspectorDrawer" class="inspector-drawer" hidden>
      <div class="drawer-header">
        <div class="drawer-title-group">
          <span class="drawer-badge" id="drawerBadge">INSPECTOR</span>
          <h3 id="drawerTitle">Agent Details</h3>
        </div>
        <button id="closeDrawer" class="drawer-close-btn" aria-label="Close inspector">&times;</button>
      </div>

      <nav class="drawer-tabs" aria-label="Inspector tabs">
        <button data-inspector="agent" class="drawer-tab active">Agent</button>
        <button data-inspector="spec" class="drawer-tab">SPEC.md</button>
        <button data-inspector="devplan" class="drawer-tab">DEVPLAN.md</button>
        <button data-inspector="artifacts" class="drawer-tab">Artifacts</button>
        <button data-inspector="logs" class="drawer-tab">Logs</button>
        <button data-inspector="run" class="drawer-tab">Run JSON</button>
      </nav>

      <div id="inspectorContent" class="drawer-content panel-scroll"></div>
    </aside>

  </div>

  <script src="/ultimate.js" type="module"></script>
</body>
</html>
